name: CI

on: [push, pull_request]

jobs:
  check:
    name: Check, Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: cargo check
        run: cargo check
        working-directory: rgrep

      - name: cargo test
        run: cargo test
        working-directory: rgrep

      - name: cargo clippy
        run: cargo clippy -- -D warnings
        working-directory: rgrep
